    <div class="contact-hero-container">
        <h1 class="hero-title contact-hero-title">
            Get in <span class="text-cyan">Touch</span>
        </h1>
        <p class="hero-subtitle contact-hero-subtitle">
            Have questions? We'd love to hear from you. Send us a message or visit our office.
        </p>
    </div>

    <div class="container" style="max-width: 1100px; padding-bottom: 80px;">
        <div class="row gx-lg-5">
            <div class="col-lg-6 mb-5 mb-lg-0">
                <div class="form-card m-0" style="max-width: 100%; border-radius: 12px; padding: 40px;">
                    <h3 style="color: #fff; font-weight: 700; font-size: 1.35rem; margin-bottom: 30px;">Send a Message
                    </h3>

                    <form onsubmit="alert('Message Sent Successfully!'); return false;">
                        <div class="row mb-4">
                            <div class="col-md-6 mb-4 mb-md-0">
                                <label class="mb-2" style="font-weight: 500;">Name *</label>
                                <input type="text" class="form-control" placeholder="Your name" required>
                            </div>
                            <div class="col-md-6">
                                <label class="mb-2" style="font-weight: 500;">Email *</label>
                                <input type="email" class="form-control" placeholder="you@email.com" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="mb-2" style="font-weight: 500;">Subject</label>
                            <input type="text" class="form-control" placeholder="How can we help?">
                        </div>

                        <div class="mb-4">
                            <label class="mb-2" style="font-weight: 500;">Message *</label>
                            <textarea class="form-control" rows="5" placeholder="Write your message..." required
                                style="height: auto; resize: vertical; min-height: 120px;"></textarea>
                        </div>

                        <button type="submit" class="btn btn-submit py-2 px-4 shadow-none mt-2">Send Message</button>
                    </form>
                </div>
            </div>
