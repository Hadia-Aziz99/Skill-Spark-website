    <div class="register-hero-container text-center">
        <h1 class="hero-title register-hero-title">
            <span class="text-cyan">Register</span> Now
        </h1>
        <p class="hero-subtitle mb-0">
            Fill out the form below to enroll in your chosen course and start your<br>journey.
        </p>
    </div>

      <div class="form-card">
    <form>
      <div class="row mb-4">
        <div class="col-md-6 mb-3 mb-md-0">
          <label class="mb-2">First Name *</label>
          <input type="text" class="form-control" placeholder="John" required>
        </div>
        <div class="col-md-6">
          <label class="mb-2">Last Name *</label>
          <input type="text" class="form-control" placeholder="Doe" required>
        </div>
      </div>

      <div class="row mb-4">
        <div class="col-md-6 mb-3 mb-md-0">
          <label class="mb-2">Email Address *</label>
          <input type="email" class="form-control" placeholder="john@university.edu" required>
        </div>
        <div class="col-md-6">
          <label class="mb-2">Phone Number *</label>
          <input type="tel" class="form-control" placeholder="+91 98765 43210" required>
        </div>
      </div>

      <div class="row mb-4">
        <div class="col-md-6 mb-3 mb-md-0">
          <label class="mb-2">Select Course *</label>
          <select class="form-control" required>
            <option value="" disabled selected>Choose a course...</option>
            <option>Web Development</option>
            <option>App Development</option>
            <option>UI/UX Design</option>
            <option>AI & Data Science</option>
            <option>Cybersecurity</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="mb-2">Upload Resume (Optional)</label>
          <div class="upload-box">
            <label for="resumeFile">Choose file</label>
            <input type="file" id="resumeFile">
            <span>No file chosen</span>
          </div>
        </div>
      </div>

      <div class="mb-4 d-flex flex-column">
        <label class="mb-2">Experience Level *</label>
        <div class="d-flex flex-wrap gap-4 mt-1">
          <div class="radio">
            <label class="d-flex align-items-center gap-2 m-0" style="cursor: pointer;">
              <input type="radio" name="level" required s t
                yle="width: 16px; height: 16px; margin: 0; cursor: pointer;">
              Beginner
            </label>
          </div>
          <div class="radio">
            <label class="d-flex align-items-center gap-2 m-0" style="cursor: pointer;">
              <input type="radio" name="level" required s t
                yle="width: 16px; height: 16px; margin: 0; cursor: pointer;">
              Intermediate
            </label>
          </div>
          <div class="radio">
            <label class="d-flex align-items-center gap-2 m-0" style="cursor: pointer;">
              <input type="radio" name="level" required s t
                yle="width: 16px; height: 16px; margin: 0; cursor: pointer;">
              Advanced
            </label>
          </div>
        </div>
      </div>

      <div class="mb-4">
        <div class="checkbox mb-3">
          <label class="d-flex align-items-start gap-2 m-0" style="cursor: pointer; line-height: 1.4;">
            <input type="checkbox" required style="width: 16px; height: 16px; margin-top: 2px; cursor: pointer;">
            <span>I agree to the <a href="#" style="color: #00d4ff; text-decoration: none;">Terms of Service</a> and <
                h<aref="#" style="color: #00d4ff; text-decoration: none;">Privacy Policy</a> *</span>
          </label>
        </div>
        <div class="checkbox mb-4">
          <label class="d-flex align-items-start gap-2 m-0" style="cursor: pointer; line-height: 1.4;">
            <input type="checkbox" style="width: 16px; height: 16px; margin-top: 2px; cursor: pointer;">
            <span>Subscribe to newsletter for updates and tips</span>
          </label>
        </div>
      </div>

      <button type="submit" class="btn btn-submit py-2 px-4 shadow-none">Submit Registration</button>
    </form>
  </div>
